<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – FairHive</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-layout">
  <div class="auth-card">
    <h1 style="font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); margin-bottom: 0.5rem; text-align: center;">FairHive</h1>
    <p style="color: var(--color-text-muted); text-align: center; margin-bottom: 1.5rem; font-size: var(--font-size-sm);">Reset your password</p>

    <div id="alert" class="alert alert-error" style="display:none;"></div>
    <div id="success" class="alert alert-success" style="display:none;">
      If that email is registered, a reset link has been sent. Check your inbox (or ask your admin if email is not configured).
    </div>

    <form id="forgotForm" class="form">
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
        <label for="email">Email</label>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 0.5rem;">Send reset link</button>
    </form>

    <p style="text-align: center; margin-top: 1rem; font-size: var(--font-size-sm); color: var(--color-text-muted);">
      <a href="login.html" style="color: var(--color-primary);">Back to login</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function () {
      var form    = document.getElementById('forgotForm');
      var alertEl = document.getElementById('alert');
      var success = document.getElementById('success');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        alertEl.style.display = 'none';
        success.style.display = 'none';
        var email = document.getElementById('email').value.trim();

        FairHiveAPI.post('/auth/forgot-password', { email: email }, { noAuth: true })
          .then(function () {
            form.style.display = 'none';
            success.style.display = 'block';
          })
          .catch(function (err) {
            alertEl.textContent = err.body && err.body.error ? err.body.error : 'Something went wrong. Try again.';
            alertEl.style.display = 'block';
          });
      });
    })();
  </script>
</body>
</html>
