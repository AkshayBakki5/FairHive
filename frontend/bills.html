<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bills – FairHive</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-placeholder"></div>
    <div class="main-wrap">
      <div id="navbar-placeholder"></div>
      <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem;">
          <h1 class="page-title" style="margin-bottom: 0;">Bills</h1>
          <button type="button" class="btn btn-primary" id="btnAddBill">Add bill</button>
        </div>
        <div id="no-room" class="alert alert-warning" style="display: none;">Select or create a room from the Dashboard.</div>
        <div id="loading" class="loading-wrap"><div class="spinner"></div></div>
        <div id="billList" style="display: none;"></div>
        <div id="emptyBills" class="empty-state" style="display: none;">No bills yet. Add one above.</div>

        <!-- Add bill modal -->
        <div id="addBillModal" class="modal-backdrop" style="display: none;">
          <div class="modal">
            <div class="modal-header">Add bill <button type="button" class="modal-close" id="addBillClose">&times;</button></div>
            <div class="modal-body">
              <div id="addBillError" class="alert alert-error" style="display: none;"></div>
              <div class="form-group">
                <input type="text" id="billName" placeholder=" " required>
                <label for="billName">Bill name</label>
              </div>
              <div class="form-group">
                <input type="number" id="billAmount" placeholder=" " step="0.01" min="0" required>
                <label for="billAmount">Amount (₹)</label>
              </div>
              <div class="form-group">
                <input type="date" id="billDueDate" placeholder=" ">
                <label for="billDueDate">Due date</label>
              </div>
              <div class="form-group">
                <label>Bill image (optional)</label>
                <input type="file" id="billImageFile" accept="image/*,.pdf" style="margin-bottom: 0.5rem;">
                <input type="url" id="billImageUrl" placeholder="Or paste image URL">
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-ghost" id="addBillCancel">Cancel</button>
              <button type="button" class="btn btn-primary" id="addBillSubmit">Add</button>
            </div>
          </div>
        </div>

        <!-- Edit bill modal -->
        <div id="editBillModal" class="modal-backdrop" style="display: none;">
          <div class="modal">
            <div class="modal-header">Edit bill <button type="button" class="modal-close" id="editBillClose">&times;</button></div>
            <div class="modal-body">
              <input type="hidden" id="editBillId">
              <div id="editBillError" class="alert alert-error" style="display: none;"></div>
              <div class="form-group">
                <input type="text" id="editBillName" placeholder=" " required>
                <label for="editBillName">Bill name</label>
              </div>
              <div class="form-group">
                <input type="number" id="editBillAmount" placeholder=" " step="0.01" min="0" required>
                <label for="editBillAmount">Amount (₹)</label>
              </div>
              <div class="form-group">
                <input type="date" id="editBillDueDate" placeholder=" ">
                <label for="editBillDueDate">Due date</label>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-ghost" id="editBillCancel">Cancel</button>
              <button type="button" class="btn btn-primary" id="editBillSubmit">Save</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/bills.js"></script>
</body>
</html>
