+<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – FairHive</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-layout">
  <div class="auth-card">
    <h1 style="font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); margin-bottom: 0.5rem; text-align: center;">FairHive</h1>
    <p style="color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; font-size: var(--font-size-sm);">Smart Room Expense & Chore Management</p>
    <div id="alert" class="alert alert-error" style="display: none;"></div>
    <form id="loginForm" class="form">
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
        <label for="email">Email</label>
      </div>
      <div class="form-group">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
        <label for="password">Password</label>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 0.5rem;">Sign in</button>
    </form>
    <p style="text-align: center; margin-top: 0.75rem; font-size: var(--font-size-sm);">
      <a href="forgot-password.html" style="color: var(--color-text-muted);">Forgot password?</a>
    </p>
    <p style="text-align: center; margin-top: 0.5rem; font-size: var(--font-size-sm); color: var(--text-muted);">
      Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: var(--font-weight-semibold);">Register</a>
    </p>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/invites.js"></script>
  <script>
    (function () {
      if (FairHiveAuth.redirectIfLoggedIn()) return;
      
      // Store invite token from hash if present
      FairHiveInvites.storeInviteFromHash();

      var form = document.getElementById('loginForm');
      var alertEl = document.getElementById('alert');
      function showError(msg) {
        alertEl.textContent = msg;
        alertEl.style.display = 'block';
      }
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        alertEl.style.display = 'none';
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        FairHiveAPI.post('/auth/login', { email: email, password: password }, { noAuth: true })
          .then(function (data) {
            FairHiveAuth.setSession(data.token, data.user);
            // Check for pending invite and accept it
            FairHiveInvites.handlePendingInviteAfterAuth().then(function (redirected) {
              if (!redirected) {
                window.location.href = 'dashboard.html';
              }
            });
          })
          .catch(function (err) {
            showError(err.body && err.body.error ? err.body.error : 'Login failed');
          });
      });
    })();
  </script>
</body>
</html>
