<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – FairHive</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-layout">
  <div class="auth-card">
    <h1 style="font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); margin-bottom: 0.5rem; text-align: center;">FairHive</h1>
    <p style="color: var(--color-text-muted); text-align: center; margin-bottom: 1.5rem; font-size: var(--font-size-sm);">Choose a new password</p>

    <div id="alert"   class="alert alert-error"   style="display:none;"></div>
    <div id="success" class="alert alert-success" style="display:none;">
      Password updated! <a href="login.html" style="color: var(--color-primary); font-weight: var(--font-weight-semibold);">Log in</a>
    </div>
    <div id="invalid" class="alert alert-error"   style="display:none;">
      This reset link is invalid or has expired. <a href="forgot-password.html" style="color: var(--color-primary);">Request a new one</a>.
    </div>

    <form id="resetForm" class="form">
      <div class="form-group">
        <input type="password" id="password" placeholder=" " required minlength="6" autocomplete="new-password">
        <label for="password">New password (min 6 characters)</label>
      </div>
      <div class="form-group">
        <input type="password" id="confirm" placeholder=" " required autocomplete="new-password">
        <label for="confirm">Confirm new password</label>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 0.5rem;">Set new password</button>
    </form>

    <p style="text-align: center; margin-top: 1rem; font-size: var(--font-size-sm); color: var(--color-text-muted);">
      <a href="login.html" style="color: var(--color-primary);">Back to login</a>
    </p>
  </div>

  <script src="js/api.js"></script>
  <script>
    (function () {
      var params  = new URLSearchParams(window.location.search);
      var token   = params.get('token');
      var form    = document.getElementById('resetForm');
      var alertEl = document.getElementById('alert');
      var success = document.getElementById('success');
      var invalid = document.getElementById('invalid');

      if (!token) {
        form.style.display = 'none';
        invalid.style.display = 'block';
        return;
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        alertEl.style.display = 'none';
        var password = document.getElementById('password').value;
        var confirm  = document.getElementById('confirm').value;

        if (password !== confirm) {
          alertEl.textContent = 'Passwords do not match';
          alertEl.style.display = 'block';
          return;
        }

        FairHiveAPI.post('/auth/reset-password', { token: token, password: password }, { noAuth: true })
          .then(function () {
            form.style.display = 'none';
            success.style.display = 'block';
          })
          .catch(function (err) {
            var msg = err.body && err.body.error ? err.body.error : 'Something went wrong.';
            if (msg.includes('invalid') || msg.includes('expired')) {
              form.style.display = 'none';
              invalid.style.display = 'block';
            } else {
              alertEl.textContent = msg;
              alertEl.style.display = 'block';
            }
          });
      });
    })();
  </script>
</body>
</html>
