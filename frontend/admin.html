<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – FairHive</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-placeholder"></div>
    <div class="main-wrap">
      <div id="navbar-placeholder"></div>
      <main class="main-content">
        <h1 class="page-title">Admin Panel</h1>
        <div id="forbidden" class="alert alert-error" style="display: none;">Admin access required.</div>
        <div id="admin-content" style="display: none;">
          <div class="card" style="margin-bottom: 1.5rem;">
            <div class="card-header">All rooms</div>
            <div class="card-body">
              <div id="adminRoomsList" class="table-wrap"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">All users</div>
            <div class="card-body">
              <div id="adminUsersList" class="table-wrap"></div>
            </div>
          </div>
        </div>
        <div id="loading" class="loading-wrap"><div class="spinner"></div></div>
      </main>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
