<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – FairHive</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <div id="sidebar-placeholder"></div>
    <div class="main-wrap">
      <div id="navbar-placeholder"></div>
      <main class="main-content">
        <h1 class="page-title">Admin Panel</h1>
        <div id="forbidden" class="alert alert-error" style="display: none;">Admin access required.</div>
        <div id="admin-content" style="display: none;">
          <div class="card" style="margin-bottom: 1.5rem;">
            <div class="card-header">All rooms</div>
            <div class="card-body">
              <div id="adminRoomsList" class="table-wrap"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-header">All users</div>
            <div class="card-body">
              <div id="adminUsersList" class="table-wrap"></div>
            </div>
          </div>
        </div>
        <div id="loading" class="loading-wrap"><div class="spinner"></div></div>
      </main>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/layout.js"></script>
  <script>
    (function () {
      if (!FairHiveAuth.guard()) return;
      FairHiveLayout.initLayout();

      var user = FairHiveAuth.getUser();
      var forbidden = document.getElementById('forbidden');
      var adminContent = document.getElementById('admin-content');
      var loading = document.getElementById('loading');

      if (user && user.role !== 'admin') {
        loading.style.display = 'none';
        forbidden.style.display = 'block';
        return;
      }

      Promise.all([FairHiveAPI.get('/admin/rooms'), FairHiveAPI.get('/admin/users')]).then(function (results) {
        loading.style.display = 'none';
        adminContent.style.display = 'block';
        var rooms = results[0];
        var users = results[1];
        var roomRows = rooms.length ? rooms.map(function (r) {
          return '<tr><td>' + (r.name || '-') + '</td><td>' + (r.code || '-') + '</td><td>' + (r.id || '-') + '</td></tr>';
        }).join('') : '<tr><td colspan="3">No rooms</td></tr>';
        document.getElementById('adminRoomsList').innerHTML = '<table class="data-table"><thead><tr><th>Name</th><th>Code</th><th>ID</th></tr></thead><tbody>' + roomRows + '</tbody></table>';
        var userRows = users.length ? users.map(function (u) {
          return '<tr><td>' + (u.displayName || u.email || '-') + '</td><td>' + (u.email || '-') + '</td><td>' + (u.role || 'member') + '</td></tr>';
        }).join('') : '<tr><td colspan="3">No users</td></tr>';
        document.getElementById('adminUsersList').innerHTML = '<table class="data-table"><thead><tr><th>Display name</th><th>Email</th><th>Role</th></tr></thead><tbody>' + userRows + '</tbody></table>';
      }).catch(function () {
        loading.style.display = 'none';
        forbidden.style.display = 'block';
        forbidden.textContent = 'Failed to load admin data or access denied.';
      });
    })();
  </script>
</body>
</html>
